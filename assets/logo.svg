  <path d="M42 78 Q30 82 26 90" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M86 65 Q96 68 100 75" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M86 78 Q98 82 102 90" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <circle cx="57" cy="33" r="3.5" fill="#1a1a2e"/>
  <circle cx="71" cy="33" r="3.5" fill="#1a1a2e"/>
  <circle cx="58.5" cy="31.5" r="1.2" fill="#fff"/>
  <circle cx="72.5" cy="31.5" r="1.2" fill="#fff"/>
